<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chess — The Odds Room</title>
<link rel="stylesheet" href="../../style.css" />
<link rel="stylesheet" href="chess.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <a class="wordmark" href="../../index.html">The Odds Room<span class="dot">.</span></a>
    <a class="back-link" href="../../index.html">&larr; all games</a>
  </header>

  <main class="game-wrap">
    <section class="board-area">
      <div class="title-block">
        <span class="eyebrow">Calculation &amp; risk trees</span>
        <h1>Chess</h1>
        <p>Play White or Black against the computer. Every move you weigh is a small probability tree — which lines are forcing, which are just hopeful.</p>
      </div>
      <div id="status" class="status-line"></div>
      <div id="capturedTop" class="captured-row"></div>
      <div id="board" class="board"></div>
      <div id="capturedBottom" class="captured-row"></div>
    </section>

    <aside class="side-panel">
      <div class="panel">
        <div class="field">
          <label>Play as</label>
          <div class="seg" id="colorSeg">
            <button class="active" data-color="w">White</button>
            <button data-color="b">Black</button>
          </div>
        </div>
        <div class="field">
          <label>Computer strength</label>
          <div class="seg" id="diffSeg">
            <button data-depth="1">Easy</button>
            <button class="active" data-depth="2">Medium</button>
            <button data-depth="3">Hard</button>
          </div>
        </div>
        <button class="btn" id="newGameBtn" style="width:100%; justify-content:center;">New game</button>
      </div>
      <div class="panel">
        <div class="field" style="margin-bottom:8px;">
          <label>Move log</label>
        </div>
        <div id="moveLog" class="move-log"></div>
      </div>
    </aside>
  </main>

  <script src="chess-engine.js"></script>
  <script src="chess.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poker — The Odds Room</title>
<link rel="stylesheet" href="../../style.css" />
<link rel="stylesheet" href="poker.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <a class="wordmark" href="../../index.html">The Odds Room<span class="dot">.</span></a>
    <a class="back-link" href="../../index.html">&larr; all games</a>
  </header>

  <main class="game-wrap-poker">
    <div class="title-block">
      <span class="eyebrow">Expected value &amp; equity</span>
      <h1>Poker — 6-max No-Limit Hold'em</h1>
      <p>You against five computer opponents, each with a different style. Toggle the equity reader to see your live win probability and whether a call is profitable by the numbers.</p>
    </div>

    <div class="controls-row">
      <div class="field">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="equityToggle" checked /> Show equity &amp; pot odds
        </label>
      </div>
      <button class="btn" id="startBtn">Deal first hand</button>
    </div>

    <div class="table-area" id="table">
      <div class="seat seat-0" id="seat-0"></div>
      <div class="seat seat-1" id="seat-1"></div>
      <div class="seat seat-2" id="seat-2"></div>
      <div class="seat seat-3" id="seat-3"></div>
      <div class="seat seat-4" id="seat-4"></div>
      <div class="seat seat-5" id="seat-5"></div>
      <div class="community-area">
        <div class="community-cards" id="communityCards"></div>
        <div class="pot-label" id="potLabel">Pot: 0 chips</div>
      </div>
    </div>

    <div class="equity-panel">
      <div class="panel" id="equityWrap" style="display:none; padding:12px 18px; width:min(560px,90%);">
        <div class="bar-row">
          <span>You</span>
          <div class="bar-track">
            <div class="bar-win" id="equityBarWin" style="width:0%"></div>
            <div class="bar-tie" id="equityBarTie" style="width:0%"></div>
            <div class="bar-lose" id="equityBarLose" style="width:0%"></div>
          </div>
        </div>
        <div id="equityText" style="font-family:var(--mono); font-size:0.78rem; color:var(--chalk-dim); margin-top:6px;"></div>
        <div id="potOddsText" style="font-family:var(--mono); font-size:0.78rem; color:var(--brass-bright); margin-top:4px;"></div>
      </div>
    </div>

    <div class="action-panel panel" id="actionPanel" style="display:none;">
      <button class="btn secondary" id="foldBtn">Fold</button>
      <button class="btn secondary" id="checkCallBtn">Check</button>
      <div class="bet-input">
        <input type="range" id="betSlider" min="20" max="1000" step="10" value="20" />
        <span id="betAmount" class="stat value">20</span>
        <button class="btn secondary preset-btn" data-preset="half">½ pot</button>
        <button class="btn secondary preset-btn" data-preset="pot">Pot</button>
        <button class="btn secondary preset-btn" data-preset="allin">All-in</button>
      </div>
      <button class="btn" id="betRaiseBtn">Bet</button>
    </div>

    <div class="hand-result" id="resultText"></div>

    <div class="panel log-panel" id="logPanel"></div>
  </main>

  <script src="poker-engine.js"></script>
  <script src="poker.js"></script>
</body>
</html>
